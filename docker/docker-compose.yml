name: dewatering_solutions

services:
  backend:
    build:
      context: ../backend
      dockerfile: Dockerfile
    container_name: dewatering_solutions_backend
    ports:
      - "3000:3000"
    environment:
      # Configuramos el puerto y la DB. Las credenciales de Supabase
      # se pueden inyectar desde tu .env local en el sistema o CI/CD.
      - PORT=3000
      - NODE_ENV=production
    env_file:
      - ../backend/.env
    restart: unless-stopped
    networks:
      - dewatering_solutions_network

  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: dewatering_solutions_frontend
    ports:
      - "8080:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - dewatering_solutions_network

networks:
  dewatering_solutions_network:
    driver: bridge
