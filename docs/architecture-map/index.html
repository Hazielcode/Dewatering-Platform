<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dewatering Solutions — Mapa Mental Arquitectónico</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',sans-serif;background:#f0f4f8;overflow:hidden;width:100vw;height:100vh;cursor:grab}
body.grabbing{cursor:grabbing}
#canvas{position:absolute;top:0;left:0;transform-origin:0 0}
svg{position:absolute;top:0;left:0;pointer-events:none}
.node{position:absolute;border-radius:14px;padding:10px 16px;font-size:12px;font-weight:600;cursor:pointer;transition:transform .2s,box-shadow .2s;white-space:nowrap;box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:2;user-select:none}
.node:hover{transform:scale(1.08)!important;box-shadow:0 4px 20px rgba(0,0,0,.18);z-index:10}
.node .desc{display:none;position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#1a1a2e;color:#fff;padding:10px 14px;border-radius:10px;font-size:11px;font-weight:400;white-space:normal;width:220px;line-height:1.5;box-shadow:0 4px 16px rgba(0,0,0,.3);z-index:100;pointer-events:none}
.node:hover .desc{display:block}
.node .desc::before{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%);border-left:6px solid transparent;border-right:6px solid transparent;border-bottom:6px solid #1a1a2e}
.root{background:linear-gradient(135deg,#4285f4,#34a853);color:#fff;font-size:18px;font-weight:800;padding:20px 32px;border-radius:20px;box-shadow:0 6px 24px rgba(66,133,244,.4);letter-spacing:-.3px;text-align:center;line-height:1.3}
.root small{font-size:10px;font-weight:500;opacity:.8;display:block;margin-top:4px}
.cat{font-size:14px;font-weight:700;padding:12px 20px;border-radius:16px;letter-spacing:-.2px}
.sub{font-size:11px;padding:8px 14px;border-radius:10px}
.tag{font-size:9px;font-weight:700;padding:2px 6px;border-radius:4px;margin-left:4px;vertical-align:middle}
/* Colors */
.c-blue{background:#e8f0fe;color:#1a73e8;border:2px solid #4285f4}
.c-green{background:#e6f4ea;color:#0d652d;border:2px solid #34a853}
.c-red{background:#fce8e6;color:#c5221f;border:2px solid #ea4335}
.c-yellow{background:#fef7e0;color:#e37400;border:2px solid #fbbc04}
.c-purple{background:#f3e8fd;color:#7627bb;border:2px solid #a142f4}
.c-teal{background:#e0f7fa;color:#00695c;border:2px solid #00bcd4}
/* Controls */
#controls{position:fixed;bottom:20px;right:20px;display:flex;gap:8px;z-index:1000}
#controls button{width:40px;height:40px;border-radius:12px;border:none;background:#fff;box-shadow:0 2px 8px rgba(0,0,0,.12);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s}
#controls button:hover{background:#e8f0fe}
#title-bar{position:fixed;top:16px;left:16px;background:#fff;padding:12px 20px;border-radius:14px;box-shadow:0 2px 12px rgba(0,0,0,.1);z-index:1000;display:flex;align-items:center;gap:10px}
#title-bar .dots{display:flex;gap:4px}
#title-bar .dots span{width:8px;height:8px;border-radius:50%}
#title-bar h1{font-size:14px;font-weight:600;color:#202124}
#legend{position:fixed;bottom:20px;left:20px;background:#fff;padding:10px 16px;border-radius:12px;box-shadow:0 2px 12px rgba(0,0,0,.1);z-index:1000;display:flex;gap:12px;font-size:11px;color:#5f6368;flex-wrap:wrap}
#legend i{width:10px;height:10px;border-radius:3px;display:inline-block;margin-right:4px;vertical-align:middle}
</style>
</head>
<body>
<div id="title-bar">
<div class="dots"><span style="background:#4285f4"></span><span style="background:#ea4335"></span><span style="background:#fbbc04"></span><span style="background:#34a853"></span></div>
<h1>Dewatering Solutions — Mapa Arquitectónico</h1>
</div>
<div id="controls">
<button onclick="zoomIn()" title="Zoom In">+</button>
<button onclick="zoomOut()" title="Zoom Out">−</button>
<button onclick="resetView()" title="Reset">⟲</button>
</div>
<div id="legend">
<span><i style="background:#4285f4"></i>Frontend</span>
<span><i style="background:#34a853"></i>Backend</span>
<span><i style="background:#ea4335"></i>Seguridad</span>
<span><i style="background:#fbbc04"></i>Cliente</span>
<span><i style="background:#a142f4"></i>Auth/Scripts</span>
<span><i style="background:#00bcd4"></i>Database</span>
</div>
<svg id="lines" width="6000" height="4000"></svg>
<div id="canvas">
</div>
<script>
const W=6000,H=4000,CX=W/2,CY=H/2;
const canvas=document.getElementById('canvas');
const svg=document.getElementById('lines');
let scale=0.55,panX=0,panY=0,dragging=false,startX,startY;

// Node data: [id, label, x, y, class, description, parent_id]
const nodes=[
  // ROOT
  ['root','💧 Dewatering\nSolutions',CX,CY,'root','Plataforma integral de gestión empresarial para servicios de deshidratación industrial y minera.',null],

  // === MAIN BRANCHES ===
  ['frontend','⚛️ Frontend\nReact + Vite',CX-520,CY-80,'cat c-blue','Interfaz de usuario construida con React 18, Vite 8, React Router y Axios. Sirve la web pública y los dashboards.',  'root'],
  ['backend','🖥️ Backend\nNode.js + Express',CX+520,CY-80,'cat c-green','API REST con Express, autenticación JWT, RBAC y conexión a PostgreSQL via Supabase.','root'],
  ['database','🗄️ Database\nPostgreSQL',CX+80,CY+420,'cat c-teal','Base de datos relacional en Supabase con 11 tablas, JSONB y extensión pgvector para IA.','root'],
  ['security','🔒 Seguridad\nRBAC 3 Perfiles',CX-80,CY-450,'cat c-red','Sistema de control de acceso basado en roles: ADMIN, OPERATOR y CLIENT.','root'],
  ['devops','🐳 Cloud\nDocker + Deploy',CX-480,CY+350,'cat c-purple','Contenedores Docker, Nginx y configuración para despliegue en producción.','root'],

  // === FRONTEND BRANCHES ===
  ['pub-pages','📄 Páginas\nPúblicas',CX-900,CY-320,'sub c-blue','Sitio web corporativo visible para todo el mundo sin login.','frontend'],
  ['auth-pages','🔐 Auth\nPages',CX-860,CY-120,'sub c-purple','Pantallas de inicio de sesión, registro, recuperación y MFA.','frontend'],
  ['admin-pages','📊 Dashboard\nAdmin',CX-880,CY+60,'sub c-blue','Módulos de gestión exclusivos para ADMIN y OPERATOR.','frontend'],
  ['client-pages','👤 Portal\nCliente',CX-860,CY+220,'sub c-yellow','Portal aislado donde cada cliente solo ve SUS proyectos.','frontend'],
  ['components','🧩 Componentes\nCompartidos',CX-750,CY-480,'sub c-blue','Layout, contexto de auth, servicio API y chatbot.','frontend'],

  // Public sub-leaves
  ['home','HomePage\n/',CX-1200,CY-460,'sub c-blue','Landing page con hero, servicios destacados, clientes y chatbot.','pub-pages'],
  ['nosotros','NosotrosPage\n/nosotros',CX-1280,CY-370,'sub c-blue','Historia, misión y equipo de la empresa.','pub-pages'],
  ['servicios','ServiciosPage\n/servicios',CX-1280,CY-280,'sub c-blue','Catálogo visual de servicios de filtración y deshidratación.','pub-pages'],
  ['productos','ProductosPage\n/productos',CX-1200,CY-200,'sub c-blue','Catálogo de equipos con fichas técnicas descargables.','pub-pages'],

  // Auth sub-leaves
  ['login','LoginPage\n/login',CX-1180,CY-120,'sub c-purple','Inicio de sesión JWT contra PostgreSQL.','auth-pages'],
  ['register','RegisterPage\n/register',CX-1180,CY-40,'sub c-purple','Registro con aprobación pendiente del ADMIN.','auth-pages'],
  ['mfa','MfaPage\n/mfa',CX-1120,CY+30,'sub c-purple','Verificación TOTP de segundo factor.','auth-pages'],

  // Admin sub-leaves
  ['dashboard','DashboardPage\n/dashboard',CX-1200,CY+110,'sub c-green','KPIs: usuarios, leads, cotizaciones, proyectos activos.','admin-pages'],
  ['leads','LeadsPage\n/leads',CX-1220,CY+180,'sub c-green','CRM Pipeline: NEW → CONTACTED → PROPOSAL → WON/LOST.','admin-pages'],
  ['inventory','InventoryPage\n/inventory',CX-1200,CY+250,'sub c-green','CRUD de productos/equipos industriales.','admin-pages'],
  ['stores','StoresPage\n/stores',CX-1140,CY+320,'sub c-green','Gestión de sucursales con ubicación y horario.','admin-pages'],
  ['staff','StaffPage\n/staff',CX-1100,CY+390,'sub c-red','Gestión de personal y asignación de roles. SOLO ADMIN.','admin-pages'],
  ['audit','AuditPage\n/audit',CX-1040,CY+450,'sub c-red','Registro inmutable de acciones (Gran Ojo). SOLO ADMIN.','admin-pages'],
  ['roles','RolesPage\n/roles',CX-960,CY+500,'sub c-red','CRUD de roles del sistema RBAC. SOLO ADMIN.','admin-pages'],
  ['approvals','ApprovalsPage\n/approvals',CX-860,CY+540,'sub c-red','Cola de aprobación de registros nuevos. SOLO ADMIN.','admin-pages'],

  // Client sub-leaves
  ['cprojects','ClientProjects\n/client/projects',CX-1140,CY+600,'sub c-yellow','El cliente solo ve SUS proyectos asignados.','client-pages'],
  ['cquotes','ClientQuotations\n/client/quotations',CX-1020,CY+650,'sub c-yellow','Cotizaciones enviadas con ítems y montos.','client-pages'],
  ['cdocs','ClientDocuments\n/client/documents',CX-880,CY+680,'sub c-yellow','Documentos compartidos de su proyecto.','client-pages'],

  // Components sub-leaves
  ['layout','DashboardLayout',CX-1050,CY-560,'sub c-blue','Sidebar dinámico según rol, header con avatar.','components'],
  ['authctx','AuthContext',CX-950,CY-600,'sub c-blue','Context React con JWT, user data y hasRole().','components'],
  ['apijs','api.js',CX-840,CY-620,'sub c-blue','Axios con interceptor que inyecta el token JWT.','components'],
  ['chatbot','Chatbot IA',CX-720,CY-580,'sub c-blue','Widget flotante de atención al visitante.','components'],

  // === BACKEND BRANCHES ===
  ['routes','🛣️ Rutas\nAPI REST',CX+900,CY-320,'sub c-green','Endpoints /api/* que reciben requests del frontend.','backend'],
  ['models','🧠 Modelos\nde Datos',CX+920,CY-80,'sub c-green','Queries SQL directas a PostgreSQL para cada entidad.','backend'],
  ['middlewares','🔒 Middlewares\nSeguridad',CX+880,CY+120,'sub c-red','Capas de protección: JWT, RBAC, ABAC y error handler.','backend'],
  ['scripts','🔧 Scripts\nMigraciones',CX+800,CY+300,'sub c-purple','Herramientas de mantenimiento y seed de datos.','backend'],

  // Routes sub-leaves
  ['r-auth','authRoutes\n/api/auth',CX+1200,CY-500,'sub c-green','Login, registro, refresh token, logout.','routes'],
  ['r-users','userRoutes\n/api/users',CX+1260,CY-420,'sub c-green','CRUD usuarios, cambio de roles, activación.','routes'],
  ['r-leads','leadRoutes\n/api/leads',CX+1280,CY-340,'sub c-green','Pipeline CRM completo.','routes'],
  ['r-quot','quotationRoutes\n/api/quotations',CX+1260,CY-260,'sub c-green','Cotizaciones con número automático COT-YYYY-XXXX.','routes'],
  ['r-proj','projectRoutes\n/api/projects',CX+1200,CY-180,'sub c-green','Proyectos post-venta con ingeniero asignado.','routes'],
  ['r-prod','productRoutes\n/api/products',CX+1260,CY-100,'sub c-green','Inventario con especificaciones JSONB.','routes'],
  ['r-audit','auditRoutes\n/api/audit',CX+1220,CY-20,'sub c-green','Lectura de logs inmutables y estadísticas.','routes'],

  // Models sub-leaves
  ['m-user','userModel',CX+1220,CY+50,'sub c-green','findByEmail, create, getAll, updateRole, getStats.','models'],
  ['m-lead','leadModel',CX+1240,CY+120,'sub c-green','Pipeline con filtros por estado y prioridad.','models'],
  ['m-quot','quotationModel',CX+1220,CY+190,'sub c-green','Generación de número y cálculo de totales.','models'],
  ['m-audit','auditModel',CX+1180,CY+260,'sub c-green','Inserta logs y genera estadísticas por acción.','models'],

  // Middleware sub-leaves
  ['mw-auth','authMiddleware',CX+1160,CY+330,'sub c-red','Verifica JWT y extrae user.id y user.role.','middlewares'],
  ['mw-rbac','rbacMiddleware',CX+1120,CY+400,'sub c-red','Valida que el rol tenga permiso para la ruta.','middlewares'],
  ['mw-abac','abacMiddleware',CX+1060,CY+460,'sub c-red','Control granular: CLIENT solo accede a SUS recursos.','middlewares'],

  // Scripts sub-leaves
  ['s-seed','seed_dewatering',CX+1040,CY+530,'sub c-purple','Pobla BD con datos demo: admin, operadores, clientes.','scripts'],
  ['s-roles','updateRoles',CX+960,CY+580,'sub c-purple','Migración que consolidó al modelo de 3 perfiles.','scripts'],
  ['s-clean','cleanDb',CX+860,CY+620,'sub c-purple','Limpia tablas de auditoría y datos de prueba.','scripts'],

  // === DATABASE BRANCHES ===
  ['t-users','👤 users',CX+300,CY+600,'sub c-teal','Usuarios con email, rol, empresa y estado activo.','database'],
  ['t-leads','📋 leads',CX+180,CY+650,'sub c-teal','Prospectos CRM con pipeline y prioridad.','database'],
  ['t-quot','💰 quotations',CX+50,CY+680,'sub c-teal','Cotizaciones con ítems JSONB y flujo de aprobación.','database'],
  ['t-proj','🏗️ projects',CX-80,CY+670,'sub c-teal','Proyectos post-venta con fechas e ingeniero.','database'],
  ['t-prod','📦 products',CX-200,CY+640,'sub c-teal','Equipos con specs JSONB y fichas PDF.','database'],
  ['t-audit','📜 audit_logs',CX+420,CY+620,'sub c-teal','Registro inmutable de toda acción en el sistema.','database'],
  ['t-embed','🧠 embeddings',CX+520,CY+580,'sub c-teal','Vectores pgvector (1536 dims) para búsqueda RAG.','database'],

  // === SECURITY BRANCHES ===
  ['role-admin','🔵 ADMIN',CX-280,CY-620,'sub c-red','Acceso total: Dashboard, Personal, Auditoría, Roles, CRM, Inventario, Aprobaciones.','security'],
  ['role-op','🟢 OPERATOR',CX-80,CY-640,'sub c-green','Dashboard, Inventario, Sucursales y CRM. Sin Personal ni Auditoría.','security'],
  ['role-client','🟡 CLIENT',CX+120,CY-620,'sub c-yellow','Portal aislado: solo sus proyectos, cotizaciones y documentos.','security'],

  // === DEVOPS ===
  ['docker','docker-compose.yml',CX-720,CY+500,'sub c-purple','Orquesta backend + frontend + BD en contenedores.','devops'],
  ['nginx','nginx.conf',CX-640,CY+570,'sub c-purple','Sirve el build de Vite como archivos estáticos.','devops'],
  ['dockerfile','Dockerfiles',CX-540,CY+620,'sub c-purple','Images Node Alpine + Nginx para producción.','devops'],
];

// Build node map
const nodeMap={};
nodes.forEach(n=>{nodeMap[n[0]]={id:n[0],label:n[1],x:n[2],y:n[3],cls:n[4],desc:n[5],parent:n[6]}});

// Render nodes
nodes.forEach(n=>{
  const div=document.createElement('div');
  div.className='node '+n[4];
  div.id='n-'+n[0];
  div.innerHTML=n[1].replace(/\n/g,'<br>')+'<div class="desc">'+n[5]+'</div>';
  div.style.left=n[2]+'px';
  div.style.top=n[3]+'px';
  div.style.transform='translate(-50%,-50%)';
  canvas.appendChild(div);
});

// Draw curved lines
function drawLines(){
  let paths='';
  nodes.forEach(n=>{
    if(!n[6])return;
    const parent=nodeMap[n[6]];
    if(!parent)return;
    const x1=parent.x,y1=parent.y,x2=n[2],y2=n[3];
    const dx=x2-x1,dy=y2-y1;
    // Curve control points
    const cx1=x1+dx*0.4,cy1=y1;
    const cx2=x2-dx*0.4,cy2=y2;
    const isRoot=n[6]==='root';
    const colors={'c-blue':'#4285f4','c-green':'#34a853','c-red':'#ea4335','c-yellow':'#fbbc04','c-purple':'#a142f4','c-teal':'#00bcd4'};
    let color='#dadce0';
    for(const[cls,c]of Object.entries(colors)){if(n[4].includes(cls)){color=c;break;}}
    const sw=isRoot?3:1.5;
    const op=isRoot?0.6:0.35;
    paths+=`<path d="M${x1},${y1} C${cx1},${cy1} ${cx2},${cy2} ${x2},${y2}" fill="none" stroke="${color}" stroke-width="${sw}" opacity="${op}"/>`;
  });
  svg.innerHTML=paths;
}
drawLines();

// Pan & Zoom
function applyTransform(){
  const t=`translate(${panX}px,${panY}px) scale(${scale})`;
  canvas.style.transform=t;
  svg.style.transform=t;
}
// Center initially
panX=window.innerWidth/2-CX*scale;
panY=window.innerHeight/2-CY*scale;
applyTransform();

document.addEventListener('mousedown',e=>{if(e.target.closest('#controls,#title-bar,#legend'))return;dragging=true;startX=e.clientX-panX;startY=e.clientY-panY;document.body.classList.add('grabbing')});
document.addEventListener('mousemove',e=>{if(!dragging)return;panX=e.clientX-startX;panY=e.clientY-startY;applyTransform()});
document.addEventListener('mouseup',()=>{dragging=false;document.body.classList.remove('grabbing')});
document.addEventListener('wheel',e=>{e.preventDefault();const d=e.deltaY>0?-0.05:0.05;const ns=Math.max(0.15,Math.min(2,scale+d));const r=ns/scale;panX=e.clientX-(e.clientX-panX)*r;panY=e.clientY-(e.clientY-panY)*r;scale=ns;applyTransform()},{passive:false});

function zoomIn(){scale=Math.min(2,scale+0.1);applyTransform()}
function zoomOut(){scale=Math.max(0.15,scale-0.1);applyTransform()}
function resetView(){scale=0.55;panX=window.innerWidth/2-CX*scale;panY=window.innerHeight/2-CY*scale;applyTransform()}
</script>
</body>
</html>
